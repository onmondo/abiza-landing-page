name: CICD Abiza Landing Page

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node JS 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm i

    - name: Build
      run: npm run build

    - name: Deploy to Cloudflare pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CFLARE_API_TOKEN }}
        accountId: fa8eaa961427644b3d1208cc0ae9fc1b
        projectName: abiza
        directory: /dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        branch: dev
